plugins {
    id 'com.gradleup.shadow'
}

def platform = project.name

architectury {
    platformSetupLoomIde()
    fabric()
}

configurations {
    common {
        canBeResolved = true
        canBeConsumed = false
    }
    compileClasspath.extendsFrom common
    runtimeClasspath.extendsFrom common
    developmentFabric.extendsFrom common

    // Files in this configuration will be bundled into your mod using the Shadow plugin.
    // Don't use the `shadow` configuration from the plugin itself as it's meant for excluding files.
    shadowBundle {
        canBeResolved = true
        canBeConsumed = false
    }
}

repositories {
    maven { url 'https://api.modrinth.com/maven' }
}

fabricApi {
    configureDataGeneration {
        client = true
        // Output straight into common's resources, so the generated files are
        // picked up automatically and shared by both the fabric and neoforge jars.
        outputDirectory = rootProject.file("common/src/main/generated")
    }
}

dependencies {
    modImplementation "net.fabricmc:fabric-loader:${project.fabric_loader_version}"

    common(project(path: ':common', configuration: 'namedElements')) { transitive = false }
    shadowBundle project(path: ':common', configuration: 'transformProductionFabric')

    // Fabric API
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    // Tiny Config
    include(modImplementation("maven.modrinth:tiny-config:${project.tiny_config_version}-${platform}"))

    modCompileOnly "maven.modrinth:dungeon-difficulty:3.6.10+1.21.1-fabric"
    modLocalRuntime "maven.modrinth:dungeon-difficulty:3.6.10+1.21.1-fabric"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand(project.properties)
    }
}

shadowJar {
    configurations = [project.configurations.shadowBundle]
    archiveClassifier = 'dev-shadow'
}

remapJar {
    inputFile.set shadowJar.archiveFile
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}" }
    }
}
